version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: vpn-postgres
    environment:
      POSTGRES_USER: vpn_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: vpn_saas
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpn_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: vpn-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: vpn-api
    environment:
      DATABASE_URL: postgresql://vpn_user:${DB_PASSWORD:-changeme}@postgres:5432/vpn_saas
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
    volumes:
      - ./vless_vpn_api.py:/app/vless_vpn_api.py
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Web Panel (Nginx)
  web:
    image: nginx:alpine
    container_name: vpn-web
    volumes:
      - ./web/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    restart: unless-stopped

  # XRay VPN Node
  xray-node:
    image: teddysun/xray:latest
    container_name: vpn-xray
    network_mode: host
    cap_add:
      - NET_ADMIN
    volumes:
      - ./xray/config.json:/etc/xray/config.json:ro
      - ./xray/certs:/etc/xray/certs:ro
    restart: unless-stopped
    environment:
      - TZ=UTC

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: vpn-network
