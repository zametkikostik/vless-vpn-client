name: vless_vpn_mobile
description: VLESS VPN Ultimate - DPI Bypass & Cheburnet Resistance
publish_to: 'none'
version: 4.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  material_design_icons_flutter: ^7.0.7296

  # State Management
  provider: ^6.1.1
  get: ^4.6.6

  # Network
  dio: ^5.4.0
  connectivity_plus: ^5.0.2
  http: ^1.1.0
  web_socket_channel: ^2.4.0

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  path_provider: ^2.1.1

  # Utils
  intl: ^0.18.1
  url_launcher: ^6.2.2
  package_info_plus: ^5.0.1
  device_info_plus: ^10.0.0
  permission_handler: ^11.1.0

  # Background service
  flutter_background_service: ^5.0.5
  flutter_local_notifications: ^16.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
